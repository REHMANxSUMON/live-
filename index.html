<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS TV | Premium Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav class="sidebar">
            <div class="logo">RS TV</div>
            <ul>
                <li class="active" onclick="showPage('home')">Home</li>
                <li onclick="showPage('channels')">Channels</li>
                <li onclick="showPage('dev')">Developer</li>
                <li onclick="showPage('settings')">Settings</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <input type="text" id="search" placeholder="Search channels..." onkeyup="filterChannels()">
            </header>

            <section id="home-page" class="page">
                <h1>Featured Live</h1>
                <div class="grid" id="channel-container"></div>
            </section>

            <section id="player-page" class="page hidden">
                <div class="video-player">
                    <div class="player-overlay">
                        <h2 id="current-channel-name">Channel Name</h2>
                        <div class="controls">
                            <button>Play</button>
                            <button>Pause</button>
                            <button>Fullscreen</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="dev-page" class="page hidden">
                <div class="card">
                    <h2>Developer Info</h2>
                    <p>Building the future of streaming.</p>
                    <div class="socials">
                        <button>Facebook</button>
                        <button>WhatsApp</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
